[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 8080

[[redirects]]
  from = "/api/register"
  to = "/.netlify/functions/register"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://healthyday-backend-v2-773381060399.asia-south1.run.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[edge_functions]]
  path = "/"
  function = "geo-redirect"

[[edge_functions]]
  path = "/pricing"
  function = "geo-redirect"

[[edge_functions]]
  path = "/renew"
  function = "geo-redirect"

[[edge_functions]]
  path = "/renew/*"
  function = "geo-redirect"

[[edge_functions]]
  path = "/upgrade"
  function = "geo-redirect"
